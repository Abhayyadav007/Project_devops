version: "3.9"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: newdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── HTTP Backend (port 3002) ──
  http-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: http-backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://postgres:password123@postgres:5432/newdb
      JWT_SECRET: ${JWT_SECRET:-supersecretkey123}
      ROOT_VALIDATOR_ID: ${ROOT_VALIDATOR_ID:-10001}
      ROOT_VALIDATOR_NAME: ${ROOT_VALIDATOR_NAME:-Root Validator}
      ROOT_VALIDATOR_EMAIL: ${ROOT_VALIDATOR_EMAIL:-root.validator@example.com}
      ROOT_VALIDATOR_PASSWORD: ${ROOT_VALIDATOR_PASSWORD:-Validator@123}
    depends_on:
      postgres:
        condition: service_healthy

  # ── WebSocket Backend (port 3003) ──
  wsbackend:
    build:
      context: .
      dockerfile: Dockerfile
      target: wsbackend
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      JWT_SECRET: ${JWT_SECRET:-supersecretkey123}
    depends_on:
      - http-backend

  # ── Dashboard Frontend (port 3006) ──
  dashboard-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard-frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3002
        NEXT_PUBLIC_WS_URL: ws://localhost:3003
        NEXT_PUBLIC_AUTH_URL: http://localhost:3007
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3002
      NEXT_PUBLIC_WS_URL: ws://localhost:3003
      NEXT_PUBLIC_AUTH_URL: http://localhost:3007
    depends_on:
      - http-backend

  # ── Auth Dashboard (port 3007) ──
  authdashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: authdashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3002
    restart: unless-stopped
    ports:
      - "3007:3007"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3002
      NEXT_PUBLIC_AUTHDASHBOARD_VALIDATOR_NAME: Root Validator
      NEXT_PUBLIC_AUTHDASHBOARD_VALIDATOR_USER_ID: "10001"
      NEXT_PUBLIC_AUTHDASHBOARD_VALIDATOR_EMAIL: root.validator@example.com
      NEXT_PUBLIC_AUTHDASHBOARD_VALIDATOR_PASSWORD: Validator@123
    depends_on:
      - http-backend

volumes:
  pgdata:
